<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="box">
            <div class="header">
                <div class="header-name">
                    <h1>Weather App</h1>
                    <p>Welcome to the Weather App!</p>
                </div>
                <form id="city-input">
                    <input class="textarea" type="text" placeholder="Enter city name" required><br>
                    <button type="submit">Get Weather</button>
                </form>
                <div class="weather-container">
                    <div class="time-location">
                        <p class="temp">30°C</p>
                        <p>Delhi</p>
                        <p>12:58 PM</p>
                        <p>Monday 15-06-2026</p>
                        <p class="weather-info">Condition: Sunny</p>
                    </div>
                </div>
            </div><br>
            <hr><br>
            <fieldset class="instruct">
                <legend>Instructions</legend>
                <h4>You Can Check These!</h4>
                <p>Temprature,</p>
                <p>Date and Time,</p>
                <p>Weather Condition</p>
            </fieldset><br>
            <fieldset class="feed">
                <legend>Feedback</legend>
                <h4>We Value Your Feedback!</h4>
                <p>Your Name:</p>
                <textarea placeholder="Enter your name" required></textarea><br>
                <p>Your e-Mail:</p>
                <textarea placeholder="Enter your e-mail" required></textarea><br>
                <p>Your Feedback:</p>
                <textarea placeholder="Enter your feedback here" required></textarea><br>
                <button type="submit">Submit</button>&nbsp;
                <button type="reset">Reset</button>
            </fieldset>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
