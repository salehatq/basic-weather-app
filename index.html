<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="box">
            <div class="header">
                <div class="header-name">
                    <h1 href="#">Weather App</h1>
                    <p>Welcome to the Weather App!</p>
                </div>
                <form id="city-input">
                    <input id="location" class="textarea" type="text" placeholder="Enter city name" required><br>
                    <button type="submit">Get Weather</button>
                </form>
                <div class="weather-container">
                    <div class="time-location">
                        <p class="temp" id="temp">--°C</p>
                        <p id="city">City</p>
                        <p id="time">--:--</p>
                        <p id="date">--</p>
                        <p class="weather-info" id="condition">Condition: --</p>
                        <p id="result"></p>
                    </div>
                </div>
            </div><br>
            <hr><br>
            <fieldset class="instruct">
                <legend>Instructions</legend>
                <h4>You Can Check These!</h4>
                <p>Temprature,</p>
                <p>Date and Time,</p>
                <p>Weather Condition</p>
                <p>Wind Speed & Clouds</p>
            </fieldset><br>
            <fieldset class="feed">
                <legend>Feedback</legend>
                <h4>We Value Your Feedback!</h4>
                <label for="username" id="label-name">Name: </label>
                <input type="text" id="username" class="textarr" required placeholder="Enter your name"><br><br>

                <label for="email" id="label-email">Email: </label>
                <input type="email" id="email" class="textarr" required placeholder="Enter your email"><br>
                <p>Your Feedback:</p>

                <textarea placeholder="Enter your feedback here" required></textarea><br>

                <button type="submit" onclick="getName()">Submit</button>&nbsp;
                <button type="reset" onclick="resetForm()">Reset</button>
            </fieldset>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
