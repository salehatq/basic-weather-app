<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="header">
                <div class="app-name">
                    <h1>Weather App</h1>
                </div>
                <div class="welcome">
                    <p>Welcome to the Weather App!</p>
                </div><br>
                <form id="weather-form">
                    <input type="text" placeholder="Enter city name" required class="city-input"><br><br>
                    <button type="submit">Get Weather</button>
                </form><br>
                <div class="weather-container">
                    <div class="temp">
                        <p>30°C</p>
                    </div>
                    
                    <div class="time-location">
                        <p>Delhi</p>
                        <p>12:58 PM</p>
                        <p>Monday 15-06-2026</p>
                    </div>
                    <div class="weather-info">
                        <p>Condition: Sunny</p>
                    </div>
                </div><br>
            </div><hr><br>
            <fieldset class="field">
                <legend>Instructions</legend>
                <h4>You Can Check These!</h4>
                <p>Temprature,</p>
                <p>Date and Time,</p>
                <p>Weather Condition</p>
            </fieldset>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
