<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="header">
                <!-- Header Section -->
                <div class="header-name">
                    <h1 href="#">Weather App</h1>
                    <p>Welcome to the Weather App!</p>
                </div>

                <!-- City Input Section -->
                <form id="city-input">
                    <input id="location" class="textarea" type="text" placeholder="Enter city name" required><br>
                    <button type="submit">Get Weather</button>
                </form>

                <!-- Weather Result Section -->
                <div class="weather-container">
                    <div class="time-location">
                        <p class="temp" id="temp">--°C</p>
                        <p id="city">City</p>
                        <p id="time">--:--</p>
                        <p id="date">--</p>
                        <p class="weather-info" id="condition">Condition: --</p>
                        <p id="result"></p>
                    </div>
                </div>

            </div><br>
            <hr><br>

            <!-- Instructions Section -->
            <fieldset class="instruct">
                <legend>Instructions</legend>
                <h4>You Can Check These!</h4>
                <p>Temprature,</p>
                <p>Date and Time,</p>
                <p>Weather Condition</p>
                <p>Wind Speed & Clouds</p>
            </fieldset><br>

            <!-- Feedback Section -->
            <fieldset class="feed">
                <legend>Feedback</legend>
                <h4>We Value Your Feedback!</h4>

                <label for="username" id="label-name">Name: </label>
                <input type="text" id="username" class="textarr" required placeholder="Enter your name">

                <label for="email" id="label-email">Email: </label>
                <input type="email" id="email" class="textarr" required placeholder="Enter your email">

                <p>Your Feedback:</p>
                <textarea placeholder="Enter your feedback here" required></textarea><br>

                <button type="submit" onclick="return getName(event)">Submit</button>
                <button type="reset" onclick="resetForm()">Reset</button>
            </fieldset>
            <footer>
                Made with &hearts; by Saleh
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
